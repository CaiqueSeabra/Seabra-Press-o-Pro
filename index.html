<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#09090b" />
    
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Seabra Pro">
    <meta name="apple-mobile-web-app-title" content="Seabra Pro">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#09090b">
    
    <link rel="canonical" href="https://ais-pre-x4evtpqfoiwjx3y7ccdtzp-160597658503.us-east5.run.app" />
    <title>Seabra Pressão Pro</title>
    
    <script>
      window.isWebView = function() {
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isAndroidWebView = (ua.indexOf('wv') > -1) || (ua.indexOf('Android') > -1 && ua.indexOf('Version/') > -1);
        var isIosWebView = (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) && (ua.indexOf('Safari') === -1);
        return isAndroidWebView || isIosWebView;
      };
    </script>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;background-color:#09090b;display:flex;align-items:center;justify-content:center;color:#3b82f6;font-family:sans-serif;">
         <div style="text-align:center;">
            <div style="border:4px solid #3b82f6;border-top-color:transparent;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:0 auto 20px;"></div>
            <p style="font-weight:900;letter-spacing:0.2em;font-size:10px;">INICIANDO SEABRA PRO...</p>
         </div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Registro simples do Service Worker para cache/offline
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js?v=4')
            .then(reg => console.log('SW offline cache OK', reg))
            .catch(err => console.log('Erro no SW', err));
        });
      }
    </script>
  </body>
</html>
